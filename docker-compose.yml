# ──────────────────────────────────────────────────────────────────────────
# AI Data Engineer — Docker Compose (Local Dev)
# ──────────────────────────────────────────────────────────────────────────
# Spins up:
#   1. Qdrant (vector DB) on ports 6333 / 6334
#   2. The Streamlit app on port 8501
# ──────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Qdrant Vector Database ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Streamlit Application ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cre_dashboard
    ports:
      - "8501:8501"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - FMP_API_KEY=${FMP_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
